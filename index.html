<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2H Goal Model - Live Half-Time Predictions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Antonio:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #141922;
            --bg-card: #1a1f2e;
            --accent-green: #00ff88;
            --accent-red: #ff4466;
            --accent-yellow: #ffbb00;
            --text-primary: #e6e8eb;
            --text-secondary: #8b92a0;
            --border: #252d3d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .hero {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            border-bottom: 2px solid var(--accent-green);
            padding: 3rem 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.1) 0%, transparent 70%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.6; }
        }

        .hero h1 {
            font-family: 'Antonio', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        .hero h1 span {
            color: var(--accent-green);
        }

        .hero p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            max-width: 1200px;
            margin: -2rem auto 2rem;
            padding: 0 1.5rem;
            position: relative;
            z-index: 10;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-green);
            box-shadow: 0 8px 24px rgba(0, 255, 136, 0.15);
        }

        .stat-value {
            font-family: 'Antonio', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-green);
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .stat-value.negative {
            color: var(--accent-red);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .section-header {
            font-family: 'Antonio', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            position: relative;
            padding-left: 1rem;
        }

        .section-header::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 100%;
            background: var(--accent-green);
        }

        .prediction-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .prediction-card:hover {
            border-color: var(--accent-green);
        }

        .prediction-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .match-info {
            flex: 1;
            min-width: 250px;
        }

        .match-info h3 {
            font-family: 'Antonio', sans-serif;
            font-size: 1.3rem;
            margin-bottom: 0.25rem;
            color: var(--text-primary);
        }

        .match-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .probability-badge {
            background: linear-gradient(135deg, var(--accent-green), #00cc66);
            color: var(--bg-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-family: 'Antonio', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            min-width: 120px;
        }

        .prediction-content {
            display: grid;
            gap: 1rem;
            margin-top: 1rem;
        }

        .prediction-type {
            font-size: 0.85rem;
            color: var(--accent-yellow);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .analysis-points {
            list-style: none;
            margin-top: 0.75rem;
        }

        .analysis-points li {
            padding-left: 1.25rem;
            margin-bottom: 0.5rem;
            position: relative;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .analysis-points li::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: var(--accent-green);
        }

        .result-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 1rem;
        }

        .result-badge.win {
            background: rgba(0, 255, 136, 0.2);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }

        .result-badge.loss {
            background: rgba(255, 68, 102, 0.2);
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }

        .result-badge.pending {
            background: rgba(255, 187, 0, 0.2);
            color: var(--accent-yellow);
            border: 1px solid var(--accent-yellow);
        }

        .score-display {
            font-family: 'Antonio', sans-serif;
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-top: 0.5rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        .empty-state h3 {
            font-family: 'Antonio', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .footer {
            text-align: center;
            padding: 3rem 1.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 4rem;
        }

        .footer a {
            color: var(--accent-green);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .stats-bar {
                grid-template-columns: 1fr 1fr;
                margin-top: -1.5rem;
            }

            .prediction-header {
                flex-direction: column;
            }

            .probability-badge {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1><span>2H</span> GOAL MODEL</h1>
        <p>Data-driven second half predictions • Posted live at half-time</p>
    </div>

    <div class="stats-bar">
        <div class="stat-card">
            <div class="stat-value" id="total-picks">0</div>
            <div class="stat-label">Total Picks</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="win-rate">0%</div>
            <div class="stat-label">Win Rate</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="roi">0%</div>
            <div class="stat-label">ROI</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="profit">+0.0u</div>
            <div class="stat-label">Profit/Loss</div>
        </div>
    </div>

    <div class="container">
        <h2 class="section-header">Today's Predictions</h2>
        <div id="upcoming-predictions">
            <!-- Predictions will be loaded here -->
        </div>

        <h2 class="section-header" style="margin-top: 3rem;">Recent Results</h2>
        <div id="recent-predictions">
            <!-- Past predictions will be loaded here -->
        </div>
    </div>

    <div class="footer">
        <p>Track record updated in real-time • All predictions posted at half-time</p>
        <p style="margin-top: 1rem;">Follow on <a href="https://twitter.com/yourusername" target="_blank">Twitter/X</a> • Join <a href="https://t.me/yourchannel" target="_blank">Telegram</a></p>
    </div>

    <script src="predictions.js"></script>
</body>
</html>
